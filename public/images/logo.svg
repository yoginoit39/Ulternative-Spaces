    d="M 100,100
       C 100,66 82,44 68,44
       C 46,44 30,68 30,100
       C 30,132 46,156 68,156
       C 82,156 100,134 100,100
       C 100,66 118,44 132,44
       C 154,44 170,68 170,100
       C 170,132 154,156 132,156
       C 118,156 100,134 100,100"
    fill="none"
    stroke="#c8922a"
    stroke-width="5"
    stroke-linecap="round"
    stroke-linejoin="round"
  />
</svg>
