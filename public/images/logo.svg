<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
  <!-- Dark circle background -->
  <circle cx="100" cy="100" r="98" fill="#1a1816"/>

  <!-- Left filled circle -->
  <circle cx="68" cy="100" r="28" fill="#c8922a"/>
  <!-- Right filled circle -->
  <circle cx="132" cy="100" r="28" fill="#c8922a"/>

  <!-- Infinity / lemniscate outline (open path for stroke animation) -->
